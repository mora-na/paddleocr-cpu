name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache GGUF models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: models/
          key: gguf-models-v1
          restore-keys: |
            gguf-models-

      - name: Install huggingface-cli
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: pip install -q huggingface-hub

      - name: Download GGUF models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          
          echo "Downloading PaddleOCR-VL-1.5.gguf..."
          huggingface-cli download TheMuppets/ggrcpp-GGUF PaddleOCR-VL-1.5.gguf \
            --local models/PaddleOCR-VL-1.5.gguf \
            --token ${{ secrets.HF_TOKEN }}
          
          echo "Downloading PaddleOCR-VL-1.5-mmproj.gguf..."
          huggingface-cli download TheMuppets/ggrcpp-GGUF PaddleOCR-VL-1.5-mmproj.gguf \
            --local models/PaddleOCR-VL-1.5-mmproj.gguf \
            --token ${{ secrets.HF_TOKEN }}
          
          echo "Models downloaded:"
          ls -lh models/

      - name: Show cached models
        if: steps.cache-models.outputs.cache-hit == 'true'
        run: |
          echo "Using cached models:"
          ls -lh models/

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
